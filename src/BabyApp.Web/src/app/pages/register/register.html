<div class="auth-page">
  <div class="auth-visual">
    <img
      class="auth-hero-img"
      src="/auth-illustration.svg"
      width="420"
      height="420"
      alt="Svijetla ilustracija roditelja i bebe"
    />
    <div class="auth-brand">
      <strong>Baby App</strong>
      <span>Kreiraj račun i prati rutinu bebe uz jasan pregled.</span>
    </div>
  </div>
  <div class="auth-panel">
    <div class="card">
      <h1>Registracija</h1>
      <p class="lead">Napravi profil roditelja — bebe dodaješ nakon prijave.</p>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <label>
          Email
          <input type="email" formControlName="email" autocomplete="username" />
        </label>
        <label>
          Lozinka (min. 6 znakova)
          <input type="password" formControlName="password" autocomplete="new-password" />
        </label>
        @if (errorMessage) {
          <p class="error">{{ errorMessage }}</p>
        }
        <button type="submit" [disabled]="form.invalid">Registriraj se</button>
      </form>
      <p class="muted">Već imaš račun? <a routerLink="/login">Prijava</a></p>
    </div>
  </div>
</div>
